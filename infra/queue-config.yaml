# Cluster-scoped Kueue configuration: the FIXED-CAPACITY quota + priority classes
# that drive preemption. These are the heart of the demo.
#
# Why this lives in infra/ (deploy time) and NOT cluster/ (bootstrap): these are
# Kueue CRs whose creation is validated by the Kueue operator's webhook. Applying
# them at bootstrap would race the operator coming up (and the Hub's build_infra.sh
# applies cluster/ once, with no retry). By deploy time the operator — installed
# from cluster/ at bootstrap (Hub) or by setup_infra.sh Step 3+4 (standalone) — is
# already serving its webhook, so these apply cleanly. They are cluster-scoped, so
# kubectl ignores the deploy namespace; re-applying across namespaces is idempotent.
#
# All names here are FIXED (not templated): cluster-scoped objects are shared
# across every feature namespace, so the namespaced LocalQueue (localqueue.yaml)
# points at this ClusterQueue by these literal names.

# --------------------------------------------------------------------------- #
# ResourceFlavor — maps the logical quota onto the CPU Spot ComputeClass nodes.
# Job pods that Kueue admits inherit this flavor's nodeSelector, so admitted work
# lands on the kueue-demo-cpu Spot nodes (cluster/cpu-computeclass.yaml).
# --------------------------------------------------------------------------- #
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: kueue-demo-spot
spec:
  nodeLabels:
    cloud.google.com/compute-class: kueue-demo-cpu
---
# --------------------------------------------------------------------------- #
# ClusterQueue — THE FIXED CAPACITY. nominalQuota: 6 CPU is the whole pool.
# When it is full and a higher-priority Workload arrives, preemption kicks in.
#   preemption.withinClusterQueue: LowerPriority
#     -> a pending Workload may evict an ADMITTED Workload of strictly lower
#        priority in this same queue to fit. That eviction is the demo's payoff.
# --------------------------------------------------------------------------- #
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: kueue-demo-clusterqueue
spec:
  namespaceSelector: {}        # admit LocalQueues from any namespace
  preemption:
    withinClusterQueue: LowerPriority
    # No borrowing across queues here (single queue), so this is a no-op safeguard.
    reclaimWithinCohort: Never
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: kueue-demo-spot
          resources:
            - name: "cpu"
              nominalQuota: "6"      # <-- the fixed CPU capacity of the demo
            - name: "memory"
              nominalQuota: "12Gi"
---
# --------------------------------------------------------------------------- #
# WorkloadPriorityClasses — drive who preempts whom. A Job carries the label
# kueue.x-k8s.io/priority-class: <name>; Kueue compares these values to decide
# admission order and preemption (higher value wins).
# --------------------------------------------------------------------------- #
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: high-priority
value: 1000
description: "High-priority batch work; preempts medium- and low-priority jobs when the queue is full."
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: medium-priority
value: 500
description: "Medium-priority batch work; preempts low-priority jobs and may be preempted by high-priority jobs."
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: low-priority
value: 100
description: "Low-priority batch work; may be preempted by medium- and high-priority jobs."
