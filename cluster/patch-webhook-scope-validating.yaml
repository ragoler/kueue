# Constrain Kueue's VALIDATING webhooks the same way as the mutating ones: manage
# ONLY the demo's batch Jobs, ONLY in this feature's namespace. See
# patch-webhook-scope-mutating.yaml for the full rationale (cluster-wide Fail
# webhooks coupled the whole Hub to Kueue and gated this feature's own controller
# pods). Keep vjob (scoped to the managed namespace); delete the rest.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kueue-validating-webhook-configuration
webhooks:
  - name: vjob.kb.io
    namespaceSelector:
      matchLabels: { kueue.x-k8s.io/managed: "true" }
  - name: vdeployment.kb.io
    $patch: delete
  - name: vpod.kb.io
    $patch: delete
  - name: vstatefulset.kb.io
    $patch: delete
  - name: vjobset.kb.io
    $patch: delete
  - name: vraycluster.kb.io
    $patch: delete
  - name: vrayjob.kb.io
    $patch: delete
  - name: vrayservice.kb.io
    $patch: delete
