# Label THIS feature's namespace so the (now namespace-scoped) Kueue webhooks fire
# here — and ONLY here. cluster/patch-webhook-scope-*.yaml restrict Kueue's
# deployment/pod/statefulset/job/jobset/ray webhooks to namespaces carrying
# kueue.x-k8s.io/managed=true; this is the one namespace that has it, so Kueue
# manages the demo's Jobs here while leaving every other Hub namespace untouched.
#
# The Hub creates the deploy namespace before applying infra/, and standalone
# deploy_app.sh creates it too; applying this manifest just adds the label
# (idempotent server-side merge) for both paths.
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE}
  labels:
    kueue.x-k8s.io/managed: "true"
