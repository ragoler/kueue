# Constrain Kueue's VALIDATING webhooks the same way as the mutating ones: manage
# ONLY the demo's batch Jobs, ONLY in this feature's namespace (matched via the
# built-in kubernetes.io/metadata.name label — gke-showcase-kueue under the Hub,
# default standalone). See patch-webhook-scope-mutating.yaml for the full rationale.
# Keep vjob (scoped); delete the rest.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kueue-validating-webhook-configuration
webhooks:
  - name: vjob.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values: ["gke-showcase-kueue", "default"]
  - name: vdeployment.kb.io
    $patch: delete
  - name: vpod.kb.io
    $patch: delete
  - name: vstatefulset.kb.io
    $patch: delete
  - name: vjobset.kb.io
    $patch: delete
  - name: vraycluster.kb.io
    $patch: delete
  - name: vrayjob.kb.io
    $patch: delete
  - name: vrayservice.kb.io
    $patch: delete
