# CPU Spot ComputeClass for the batch Job pods. Cluster-scoped: a ComputeClass
# found here (or even under infra/) is routed to the cluster-scoped API by the
# Hub. Job pods select it via nodeSelector cloud.google.com/compute-class:
# kueue-demo-cpu, so GKE Node Auto-Provisioning creates cheap Spot nodes on
# demand and scales them back to zero when the queue drains.
#
# This ComputeClass is the *physical* capacity. Kueue's ClusterQueue nominalQuota
# (infra/queue-config.yaml) is the *logical* fixed quota layered on top of it —
# that quota is what makes high-priority jobs preempt low-priority ones rather
# than simply autoscaling more nodes.
apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: kueue-demo-cpu
spec:
  priorities:
    - machineFamily: n2
      spot: true
    - machineFamily: n2d
      spot: true
    - machineFamily: e2
      spot: true
  # Let GKE create Spot node pools on demand and scale them back to zero.
  nodePoolAutoCreation:
    enabled: true
  # Prefer waiting for Spot rather than silently falling back to on-demand.
  whenUnsatisfiable: ScaleUpAnyway
  activeMigration:
    optimizeRulePriority: true
