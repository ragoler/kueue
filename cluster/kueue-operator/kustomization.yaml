# Kueue operator + CRDs, pinned to a release. Because this directory has a
# kustomization.yaml, the parent cluster/ kustomization composes it and the Hub
# installs everything with `kubectl apply --server-side -k cluster/` at bootstrap
# (build_infra.sh), once per cluster. The operator is cluster-scoped and watches
# Workload / ClusterQueue / LocalQueue CRs across all feature namespaces — it is
# NOT deployed per feature.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The upstream config/default bundle installs the controller into the
# kueue-system namespace and ships all Kueue CRDs (ResourceFlavor, ClusterQueue,
# LocalQueue, Workload, WorkloadPriorityClass, …). Pinned to a real released tag.
# Server-side apply is used (by the caller) because the CRD bundle exceeds the
# client-side 256KB annotation limit.
#
# NOTE: keep this tag in lockstep with README/ARCHITECTURE. v0.18.2 is the latest
# stable Kueue release at authoring time; bump deliberately.
resources:
  - "https://github.com/kubernetes-sigs/kueue/config/default?ref=v0.18.2"
