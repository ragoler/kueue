# Constrain Kueue's MUTATING webhooks so Kueue manages ONLY the demo's batch Jobs,
# and ONLY in this feature's own namespace.
#
# The Kueue release installs cluster-wide webhooks (failurePolicy: Fail) on
# deployments, pods, statefulsets, jobs, jobsets and ray*. On a shared Hub that is
# doubly harmful: (1) it couples the WHOLE cluster to Kueue's uptime (a down Kueue
# controller blocked the admin bootstrap), and (2) the deployment/pod webhooks gate
# THIS feature's OWN controller Deployment/pods, so the controller never starts.
#
# This demo only queues `batch/v1` Jobs, so:
#   - mjob: keep, but scope it to this feature's namespace only. We match on the
#     built-in `kubernetes.io/metadata.name` label (every namespace gets it
#     automatically) — Hub deploys land in `gke-showcase-kueue`, standalone uses
#     `default`. No custom namespace label (and therefore no Namespace object in
#     infra/, which the Hub can't apply through its namespaced path) is required.
#   - everything else (deployment/pod/statefulset/jobset/ray*): DELETE — Kueue
#     should never touch those kinds. Job-level admission (suspend/resume) brings the
#     Job's pods up itself, so no pod webhook is needed.
# (Strategic-merge by webhook name; the kueue-CR webhooks
# clusterqueue/resourceflavor/workload/cohort are left untouched.)
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kueue-mutating-webhook-configuration
webhooks:
  - name: mjob.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values: ["gke-showcase-kueue", "default"]
  - name: mdeployment.kb.io
    $patch: delete
  - name: mpod.kb.io
    $patch: delete
  - name: mstatefulset.kb.io
    $patch: delete
  - name: mjobset.kb.io
    $patch: delete
  - name: mraycluster.kb.io
    $patch: delete
  - name: mrayjob.kb.io
    $patch: delete
  - name: mrayservice.kb.io
    $patch: delete
