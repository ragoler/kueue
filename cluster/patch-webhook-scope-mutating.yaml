# Constrain Kueue's MUTATING webhooks so Kueue manages ONLY the demo's batch Jobs,
# and ONLY in this feature's own namespace.
#
# The Kueue release installs cluster-wide webhooks (failurePolicy: Fail) on
# deployments, pods, statefulsets, jobs, jobsets and ray*. On a shared Hub that is
# doubly harmful:
#   1. It couples the WHOLE cluster to Kueue's uptime (a down Kueue controller
#      blocks every Deployment/Pod create — that broke the admin bootstrap), and
#   2. once this feature's namespace is opted in, the deployment/pod webhooks gate
#      THIS feature's OWN controller Deployment/pods, so the controller never
#      starts ("No pods active in namespace gke-showcase-kueue").
#
# This demo only queues `batch/v1` Jobs, so:
#   - mjob: keep, scoped to namespaces labeled kueue.x-k8s.io/managed=true (only
#     this feature's namespace carries it — see infra/namespace.yaml).
#   - everything else (deployment/pod/statefulset/jobset/ray*): DELETE — Kueue
#     should never touch those kinds. Job-level management is all the demo needs;
#     the Job's pods are admitted by suspending/resuming the Job, no pod webhook.
# (Strategic-merge by webhook name; the kueue-CR webhooks
# clusterqueue/resourceflavor/workload/cohort are left untouched.)
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kueue-mutating-webhook-configuration
webhooks:
  - name: mjob.kb.io
    namespaceSelector:
      matchLabels: { kueue.x-k8s.io/managed: "true" }
  - name: mdeployment.kb.io
    $patch: delete
  - name: mpod.kb.io
    $patch: delete
  - name: mstatefulset.kb.io
    $patch: delete
  - name: mjobset.kb.io
    $patch: delete
  - name: mraycluster.kb.io
    $patch: delete
  - name: mrayjob.kb.io
    $patch: delete
  - name: mrayservice.kb.io
    $patch: delete
