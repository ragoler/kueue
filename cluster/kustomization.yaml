# Cluster-scoped prerequisites for the kueue feature, installed once per cluster.
#
# The Hub discovers a TOP-LEVEL kustomization.yaml in cluster_dir and runs
# `kubectl apply --server-side -k cluster/` at bootstrap (build_infra.sh). The
# standalone setup_infra.sh applies this same directory, so the two paths never
# drift.
#
# Composed here so a single apply installs everything cluster-once:
#   - the Kueue release manifest -> operator + all CRDs + the kueue-system
#     Namespace + an INTERNAL webhook cert (no cert-manager dependency). Using the
#     self-contained release artifact (not config/default) avoids both a
#     cert-manager prerequisite and a duplicate-Namespace clash with a locally
#     shipped namespace.yaml.
#   - cpu-computeclass.yaml -> the CPU Spot ComputeClass jobs schedule onto.
#
# NOTE: the fixed-quota queue config (ResourceFlavor + ClusterQueue +
# WorkloadPriorityClasses) is NOT here. Those are Kueue CRs whose creation is
# gated by the operator's validating webhook, so they live in infra/ and are
# applied at deploy time — after the operator (installed here at bootstrap) is up.
# Keeping them out of this bundle also makes the Hub's single, no-retry bootstrap
# apply of cluster/ safe.
#
# Keep the pinned tag in lockstep with README/ARCHITECTURE. v0.18.2 is the latest
# stable Kueue release at authoring time; bump deliberately.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - "https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/manifests.yaml"
  - cpu-computeclass.yaml

# Keep only Kueue's job webhook (scoped to this feature's namespace via the built-in
# kubernetes.io/metadata.name label) and delete the deployment/pod/statefulset/jobset/
# ray webhooks, so the rest of the Hub is not coupled to the Kueue controller's uptime
# and Kueue never gates this feature's own controller pods. See the patch files.
patches:
  - path: patch-webhook-scope-mutating.yaml
  - path: patch-webhook-scope-validating.yaml
